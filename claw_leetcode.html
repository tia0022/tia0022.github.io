    .test-io-content {

    .test-output { color: var(--success) !important; }

    /* NAVIGATION ARROWS */
    .prob-nav {
      display: flex; justify-content: space-between; align-items: center;

      color: var(--text-muted); padding: 0.6rem 1.2rem; border-radius: 8px;
      cursor: pointer; font-size: 0.85rem; font-family: inherit;

    .prob-nav-btn:hover { border-color: var(--primary); color: var(--primary); }
    .prob-nav-btn.disabled { opacity: 0.3; pointer-events: none; }

    /* OVERVIEW PAGE */
    .overview-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem; margin-top: 1rem;
    }
    .overview-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.2rem;
      cursor: pointer; transition: all 0.2s;
      position: relative; overflow: hidden;

    .overview-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;

    .overview-card.easy::before { background: var(--success); }
    .overview-card.medium::before { background: var(--warning); }
    .overview-card.hard::before { background: var(--danger); }
    .overview-card:hover { transform: translateY(-3px); border-color: var(--primary); }
    .ov-num { font-size: 0.72rem; color: var(--text-muted); font-family: monospace; margin-bottom: 0.3rem; }
    .ov-title { font-size: 0.95rem; font-weight: 600; margin-bottom: 0.5rem; }
    .ov-algo { font-size: 0.8rem; color: var(--text-muted); }

    /* RESPONSIVE */

    }
    @media (max-width: 600px) {
      .nav-links { gap: 1rem; font-size: 0.8rem; }
      .tabs { overflow-x: auto; }
      .overview-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

<script>
// ============================================================
// PROBLEM DATA
// ============================================================
const PROBLEMS = [
  {
    id: 1, leetcodeNum: "#1", title: "两数之和", difficulty: "easy",
    tags: ["哈希表", "数组"],
    description: `给定一个整数数组 <code>nums</code> 和一个整数目标值 <code>target</code>，请你在该数组中找出<strong>和为目标值</strong> <code>target</code> 的那<strong>两个</strong>整数，并返回它们的数组下标。\n\n你可以假设每种输入只会对应一个答案，同一个元素不能出现两遍。`,
    example: { input: "nums = [2,7,11,15], target = 9", output: "[0,1]", explain: "因为 nums[0] + nums[1] == 9，返回 [0, 1]" },
    approach: "哈希表一次遍历",
    steps: [
      "用哈希表存储每个元素的值和下标 <code>{value: index}</code>",
      "遍历数组，对每个 <code>nums[i]</code>，查找 <code>target - nums[i]</code> 是否已在哈希表中",
      "若存在，直接返回两个下标；若不存在，将当前元素存入哈希表"
    ],
    timeO: "O(n)", spaceO: "O(n)",
    leetcodeCode: `class Solution:
    def twoSum(self, nums: list[int], target: int) -> list[int]:
        seen = {}  # value -> index
        for i, num in enumerate(nums):
            complement = target - num
            if complement in seen:
                return [seen[complement], i]
            seen[num] = i
        return []`,
    acmCode: `def two_sum(nums, target):
    seen = {}
    for i, num in enumerate(nums):
        complement = target - num
        if complement in seen:
            return [seen[complement], i]
        seen[num] = i
    return []

if __name__ == "__main__":
    nums = list(map(int, input().split()))
    target = int(input())
    result = two_sum(nums, target)
    print(result[0], result[1])`,
    testCases: [
      { input: "2 7 11 15\n9", output: "0 1" },
      { input: "3 2 4\n6", output: "1 2" },
      { input: "3 3\n6", output: "0 1" }
    ]
  },
  {
    id: 2, leetcodeNum: "#49", title: "字母异位词分组", difficulty: "medium",
    tags: ["哈希表", "字符串", "排序"],
    description: `给你一个字符串数组，请你将<strong>字母异位词</strong>组合在一起。字母异位词是由重新排列源单词的所有字母得到的一个新单词。`,
    example: { input: 'strs = ["eat","tea","tan","ate","nat","bat"]', output: '[["bat"],["nat","tan"],["ate","eat","tea"]]' },
    approach: "排序作为哈希键",
    steps: [
      "将每个字符串排序后的结果作为哈希表的 key",
      "同一组字母异位词排序后结果相同",
      "用哈希表将排序结果相同的字符串归为一组"
    ],
    timeO: "O(n·k·log k)", spaceO: "O(n·k)",
    leetcodeCode: `from collections import defaultdict

class Solution:
    def groupAnagrams(self, strs: list[str]) -> list[list[str]]:
        groups = defaultdict(list)
        for s in strs:
            key = tuple(sorted(s))  # 排序后作为 key
            groups[key].append(s)
        return list(groups.values())`,
    acmCode: `from collections import defaultdict

def group_anagrams(strs):
    groups = defaultdict(list)
    for s in strs:
        key = tuple(sorted(s))
        groups[key].append(s)
    return list(groups.values())

if __name__ == "__main__":
    strs = input().split()
    result = group_anagrams(strs)
    for group in result:
        print(" ".join(group))`,
    testCases: [
      { input: "eat tea tan ate nat bat", output: "eat tea ate\ntan nat\nbat" },
      { input: "a", output: "a" }
    ]
  },
  {
    id: 3, leetcodeNum: "#128", title: "最长连续序列", difficulty: "medium",
    tags: ["哈希表", "并查集"],

// ============================================================
// RENDER SIDEBAR
// ============================================================
function renderSidebar(filter = '') {
  const list = document.getElementById('problemList');
  list.innerHTML = '';
  const filtered = PROBLEMS.filter(p =>
    p.title.includes(filter) || p.leetcodeNum.includes(filter) || String(p.id).includes(filter)
  );
  filtered.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'problem-link';
    btn.id = `sidebar-${p.id}`;
    btn.onclick = () => showProblem(p.id);
    const diffClass = { easy: 'diff-easy', medium: 'diff-medium', hard: 'diff-hard' }[p.difficulty];
    btn.innerHTML = `
      <span class="prob-num">${p.leetcodeNum}</span>
      <span style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${p.title}</span>
      <span class="diff-dot ${diffClass}"></span>
    `;
    list.appendChild(btn);
  });
}

function filterProblems() {
  const q = document.getElementById('searchInput').value.trim();
  renderSidebar(q);
}

// ============================================================
// RENDER OVERVIEW
// ============================================================
function renderOverview() {
  const grid = document.getElementById('overviewGrid');
  const diffLabel = { easy: '简单', medium: '中等', hard: '困难' };
  const diffBadge = { easy: 'badge-easy', medium: 'badge-medium', hard: 'badge-hard' };
  grid.innerHTML = PROBLEMS.map(p => `
    <div class="overview-card ${p.difficulty}" onclick="showProblem(${p.id})">
      <div class="ov-num">${p.leetcodeNum}</div>
      <div class="ov-title">${p.title}</div>
      <div class="ov-algo">${p.approach}</div>
      <div class="ov-footer">
        <span class="diff-badge ${diffBadge[p.difficulty]}">${diffLabel[p.difficulty]}</span>
        <span style="font-size:0.75rem;color:var(--text-muted);">${p.tags[0]}</span>
      </div>
    </div>
  `).join('');
}

        </div>
      </div>

      <!-- TAB: ACM 测试 -->
      <div class="tab-panel" id="tab-acm-${id}">
        <div class="section-block">
          <div class="section-label">ACM 模式 — 完整代码（含 I/O）</div>
          ${buildCodeBlock(p.acmCode, 'python', `acm-full-${id}`)}
        </div>
        <div class="section-block">
          <div class="section-label">标准测试用例</div>
          <p style="color:var(--text-muted); font-size:0.85rem; margin-bottom:1rem;">
            将完整代码保存为 <code>.py</code> 文件，输入通过 stdin 传入。
          </p>
          ${testCasesAcm}
        </div>
      </div>

      <!-- NAVIGATION -->
      <div class="prob-nav">
        <${prev ? `button onclick="showProblem(${prev.id})"` : 'button disabled'} class="prob-nav-btn${prev ? '' : ' disabled'}">
          ← ${prev ? prev.title : '第一题'}
        </button>
        <button onclick="showOverview()" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:0.85rem;font-family:inherit;">
          回到总览
        </button>
        <${next ? `button onclick="showProblem(${next.id})"` : 'button disabled'} class="prob-nav-btn${next ? '' : ' disabled'}">
          ${next ? next.title : '最后一题'} →
        </button>
      </div>
    </div>
  `;

  // Highlight code
  document.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function buildCodeBlock(code, lang, id) {
  const escaped = code
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
  return `
    <div class="code-block">
      <div class="code-block-header">
        <span class="code-lang">python</span>
        <button class="copy-btn" onclick="copyCode('${id}')">复制</button>
      </div>
      <pre><code id="${id}" class="language-python">${escaped}</code></pre>
    </div>
  `;
}

function buildTestCase(tc, index, probId, type) {
  const inputEsc = tc.input.replace(/</g, '&lt;').replace(/>/g, '&gt;');
  const outputEsc = tc.output.replace(/</g, '&lt;').replace(/>/g, '&gt;');
  return `
    <div class="test-case">
      <div class="test-case-header">
        <span class="test-title">测试用例 ${index + 1}</span>
      </div>
      <div class="test-io">
        <div class="test-io-panel">
          <div class="test-io-label">输入</div>
          <div class="test-io-content">${inputEsc}</div>
        </div>
        <div class="test-io-panel">
          <div class="test-io-label">期望输出</div>
          <div class="test-io-content test-output">${outputEsc}</div>
        </div>
      </div>
    </div>
  `;
}

function switchTab(e, tabId) {
  const parent = e.target.closest('.problem-card') || document.getElementById('problemView');
  parent.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  parent.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  e.target.classList.add('active');
  document.getElementById(tabId).classList.add('active');
}

function copyCode(id) {
  const el = document.getElementById(id);
  if (!el) return;
  navigator.clipboard.writeText(el.innerText).then(() => {
    const btn = el.closest('.code-block')?.querySelector('.copy-btn');
    if (btn) {
      btn.textContent = '已复制!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = '复制'; btn.classList.remove('copied'); }, 1500);
    }
  });
}

function showOverview() {
  currentProblemId = null;
  document.getElementById('overviewPage').style.display = 'block';
  document.getElementById('problemView').style.display = 'none';
  document.querySelectorAll('.problem-link').forEach(el => el.classList.remove('active'));
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ============================================================
// INIT
// ============================================================
renderSidebar();
renderOverview();
</script>
</body>
</html>
